<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blueprintBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E1A17"/>
      <stop offset="100%" stop-color="#2A2520"/>
    </linearGradient>
    <pattern id="blueprintGrid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#CEAA6A" stroke-width="0.5" stroke-opacity="0.1"/>
    </pattern>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="100%" height="100%" fill="url(#blueprintBg)"/>
  <rect width="100%" height="100%" fill="url(#blueprintGrid)"/>
  
  <!-- Architectural Lines / Geometry -->
  <g stroke="#CEAA6A" fill="none" opacity="0.4" filter="url(#softGlow)">
    <path d="M50 150 L150 50 L350 50" stroke-width="1.5"/>
    <circle cx="150" cy="50" r="4" fill="#CEAA6A"/>
    <path d="M50 250 L150 150 L350 150" stroke-width="1"/>
    <circle cx="150" cy="150" r="3" fill="#CEAA6A"/>
    <path d="M150 50 L150 250" stroke-width="0.5" stroke-dasharray="4 4"/>
  </g>

  <!-- Technical Overlay -->
  <text x="350" y="45" font-family="monospace" font-size="10" fill="#FCFBEE" opacity="0.3" text-anchor="end">SEC: A-01 // VAL</text>
  <text x="350" y="145" font-family="monospace" font-size="10" fill="#FCFBEE" opacity="0.3" text-anchor="end">SYS: MECH // T0</text>
</svg>
