<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="plate" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#24201C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A1714;stop-opacity:1" />
    </linearGradient>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch" />
    </filter>
  </defs>
  <rect width="800" height="800" fill="url(#plate)" />
  <rect width="800" height="800" filter="url(#noise)" opacity="0.03" />
  <rect x="20" y="20" width="760" height="760" fill="none" stroke="#FCFBEE" stroke-width="1" opacity="0.1" />
  <circle cx="400" cy="400" r="4" fill="#CEAA6A" opacity="0.5" />
  <text x="50%" y="55%" dominant-baseline="middle" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" letter-spacing="0.2em" fill="#FCFBEE" opacity="0.2">MATERIAL PLATE</text>
</svg>
