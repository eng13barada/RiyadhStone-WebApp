<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="600" height="400" fill="#12100E"/>
  
  <!-- Subtle grid pattern -->
  <pattern id="light-grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.03"/>
  </pattern>
  <rect width="600" height="400" fill="url(#light-grid)"/>

  <!-- Road/Route network -->
  <path d="M0 50 C 150 70, 200 150, 600 100" stroke="#CEAA6A" stroke-width="1.5" fill="none" opacity="0.2"/>
  <path d="M100 0 L 150 400" stroke="#CEAA6A" stroke-width="0.5" fill="none" opacity="0.1"/>
  <path d="M50 250 C 200 300, 300 200, 400 400" stroke="#CEAA6A" stroke-width="1" fill="none" opacity="0.2"/>
  <path d="M400 0 L 300 150 L 500 250 L 600 300" stroke="#CEAA6A" stroke-width="0.5" fill="none" opacity="0.1"/>
  
  <!-- Node / Connection points -->
  <circle cx="150" cy="113" r="3" fill="#CEAA6A" opacity="0.6"/>
  <circle cx="300" cy="150" r="4" fill="#CEAA6A" opacity="0.9"/>
  <circle cx="280" cy="245" r="2" fill="#CEAA6A" opacity="0.4"/>
  <circle cx="500" cy="250" r="3" fill="#CEAA6A" opacity="0.5"/>
  <circle cx="490" cy="115" r="2" fill="#CEAA6A" opacity="0.4"/>

  <!-- Pulse rings around main node -->
  <circle cx="300" cy="150" r="10" stroke="#CEAA6A" stroke-width="0.5" fill="none" opacity="0.3"/>
  <circle cx="300" cy="150" r="20" stroke="#CEAA6A" stroke-width="0.25" fill="none" opacity="0.1"/>
  <circle cx="300" cy="150" r="30" stroke="#CEAA6A" stroke-width="0.1" fill="none" opacity="0.05"/>
</svg>
